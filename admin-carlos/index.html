
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GraciaConsult — Portal de administradora</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a2e4a 0%, #2d6a9f 100%); padding: 1rem;
  }
  .login-box {
    background: white; border-radius: 16px; padding: 2.5rem 2rem;
    width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .login-logo { text-align: center; margin-bottom: 1.5rem; }
  .login-logo .brand { font-size: 26px; font-weight: 700; color: #1a2e4a; }
  .login-logo .tagline { font-size: 12px; color: #6b7280; margin-top: 4px; }
  .login-box h2 { font-size: 16px; color: #374151; margin-bottom: 1.5rem; text-align: center; }
  .input-group { margin-bottom: 1rem; }
  .input-group label { display: block; font-size: 13px; color: #374151; font-weight: 500; margin-bottom: 6px; }
  .input-group input {
    width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb;
    border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: #2d6a9f; }
  .btn-login {
    width: 100%; padding: 12px; background: #1a2e4a; color: white;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.2s; margin-top: 0.5rem;
  }
  .btn-login:hover { background: #2d6a9f; }
  .login-error { color: #dc2626; font-size: 13px; text-align: center; margin-top: 0.75rem; display: none; }

  /* PORTAL */
  #portal-screen { display: none; }

  .topbar {
    background: #1a2e4a; padding: 0 1.5rem; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .topbar-brand { font-size: 18px; font-weight: 700; color: white; }
  .topbar-brand span { color: #c9a84c; }
  .topbar-client { font-size: 13px; color: #7ea8cc; }
  .btn-logout { background: none; border: 1px solid #2d4a6a; color: #7ea8cc; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .btn-logout:hover { background: #2d4a6a; color: white; }

  .main { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem; }

  .admin-header {
    background: #1a2e4a; border-radius: 12px; padding: 1.5rem;
    margin-bottom: 1.25rem; color: white;
  }
  .admin-header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .admin-sub { font-size: 13px; color: #7ea8cc; }

  .seccion-titulo { font-size: 13px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin: 0 0.25rem 0.75rem; }

  .obra-card {
    display: block; background: white; border-radius: 12px; padding: 1.1rem 1.25rem;
    margin-bottom: 0.75rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    text-decoration: none; color: inherit; transition: box-shadow 0.15s, transform 0.15s;
  }
  .obra-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.12); transform: translateY(-1px); }
  .obra-card-top { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; }
  .obra-card-titulo { font-size: 15px; font-weight: 600; color: #1a2e4a; }
  .obra-card-dir { font-size: 13px; color: #6b7280; margin-top: 2px; }
  .obra-pill { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; flex-shrink: 0; white-space: nowrap; }
  .obra-pill.en_curso   { background: rgba(45,106,159,0.15); color: #2d6a9f; }
  .obra-pill.finalizada { background: rgba(16,185,129,0.15); color: #0d9268; }
  .obra-pill.pendiente  { background: rgba(245,158,11,0.15); color: #b45309; }

  .vacio { text-align: center; padding: 1.5rem; color: #9ca3af; font-size: 13px; }
  .footer { text-align: center; padding: 2rem 1rem; font-size: 12px; color: #9ca3af; }
  .footer strong { color: #6b7280; }

  @media (max-width: 480px) {
    .topbar { padding: 0 1rem; }
    .main { padding: 1rem 0.75rem; }
    .admin-header { padding: 1rem; }
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="brand">GraciaConsult</div>
      <div class="tagline">Portal privado de seguimiento de obras</div>
    </div>
    <h2>Acceso exclusivo</h2>
    <div class="input-group">
      <label for="pass-input">Contraseña de acceso</label>
      <input type="password" id="pass-input" placeholder="Introduce tu contraseña"
        onkeydown="if(event.key==='Enter') login()">
    </div>
    <button class="btn-login" onclick="login()">Entrar</button>
    <div class="login-error" id="login-error">Contraseña incorrecta</div>
  </div>
</div>

<div id="portal-screen">
  <div class="topbar">
    <div class="topbar-brand">Gracia<span>Consult</span></div>
    <div class="topbar-client" id="topbar-nombre"></div>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>
  <div class="main">

    <div class="admin-header">
      <h1 id="admin-titulo"></h1>
      <div class="admin-sub">Selecciona una obra para ver su seguimiento</div>
    </div>

    <div class="seccion-titulo">Obras</div>
    <div id="obras-lista"></div>

    <div class="footer">
      Portal privado · <strong>GraciaConsult</strong> · A Coruña, Galicia<br>
      Para cualquier consulta contacta con tu asesor técnico
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIGURACIÓN — editar solo este bloque por cada administradora
// ═══════════════════════════════════════════════════════
const CONFIG = {

  // Contraseña única para esta administradora (válida para todas sus obras)
  password: "carloscollado123",

  administradora: {
    nombre: "Administradora" // TODO: poner el nombre real de la administradora
  },

  // OBRAS — una tarjeta por obra. "link" es la carpeta relativa de cada obra
  // (debe coincidir con la carpeta que ya tiene su propio index.html con el detalle)
  obras: [
    {
      titulo: "Reparación de fachada principal",
      direccion: "C/ Salamanca 34, A Coruña",
      estado: "en_curso", // "pendiente" | "en_curso" | "finalizada"
      link: "calle-salamanca/"
    }
  ]
};
// ═══════════════════════════════════════════════════════
// FIN CONFIGURACIÓN
// ═══════════════════════════════════════════════════════

function login() {
  const val = document.getElementById('pass-input').value.trim();
  if (val === CONFIG.password) {
    sessionStorage.setItem('gc_auth', '1');
    renderPortal();
  } else {
    const err = document.getElementById('login-error');
    err.style.display = 'block';
    document.getElementById('pass-input').value = '';
    setTimeout(() => err.style.display = 'none', 3000);
  }
}

function logout() {
  sessionStorage.removeItem('gc_auth');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('portal-screen').style.display = 'none';
  document.getElementById('pass-input').value = '';
}

function renderPortal() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('portal-screen').style.display = 'block';

  const { administradora, obras } = CONFIG;

  document.getElementById('topbar-nombre').textContent = administradora.nombre;
  document.getElementById('admin-titulo').textContent = administradora.nombre;

  const estadoLabel = { pendiente: 'Pendiente', en_curso: 'En curso', finalizada: 'Finalizada' };

  document.getElementById('obras-lista').innerHTML = obras.length
    ? obras.map(o => `
      <a class="obra-card" href="${o.link}">
        <div class="obra-card-top">
          <div>
            <div class="obra-card-titulo">${o.titulo}</div>
            <div class="obra-card-dir">${o.direccion}</div>
          </div>
          <span class="obra-pill ${o.estado}">${estadoLabel[o.estado]}</span>
        </div>
      </a>
    `).join('')
    : `<div class="vacio">No hay obras todavía</div>`;
}

window.addEventListener('load', () => {
  if (sessionStorage.getItem('gc_auth') === '1') renderPortal();
});
</script>
</body>
</html>
